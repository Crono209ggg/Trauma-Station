- type: markingsGroup
  parent: Human
  id: Felinid
  limits:
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ FelinidTailBasic ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 2
      required: true
      default: [ FelinidEarsBasic ]
  appearances:
    enum.HumanoidVisualLayers.Tail:
      matchSkin: true

- type: entity
  parent: AppearanceHuman
  id: AppearanceFelinid
  categories: [ HideSpawnMenu ]
  name: felinid appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganFelinidTorso
      Head: OrganFelinidHead
      Tail: OrganFelinidTail
      ArmLeft: OrganHumanArmLeft
      ArmRight: OrganHumanArmRight
      HandRight: OrganHumanHandRight
      HandLeft: OrganHumanHandLeft
      LegLeft: OrganHumanLegLeft
      LegRight: OrganHumanLegRight
      FootLeft: OrganHumanFootLeft
      FootRight: OrganHumanFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganHumanStomach
      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Felinid

- type: entity
  parent: OrganHumanExternal
  id: OrganFelinidExternal
  abstract: true
  components:
  - type: VisualOrganMarkings
    markingData:
      group: Felinid

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorsoTailed, OrganFelinidExternal ]
  id: OrganFelinidTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganFelinidExternal ]
  id: OrganFelinidHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout

- type: entity
  parent: [ OrganBaseTail, OrganFelinidExternal ]
  id: OrganFelinidTail
  components:
  - type: Sprite
    sprite: _Trauma/empty.rsi
    state: empty
  - type: VisualOrgan
    data:
      sprite: _Trauma/empty.rsi
      state: empty
