- type: markingsGroup
  parent: Human
  id: Resomi
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 0
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 1
      required: true
      default: [ ResomiFluffHead ]
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ ResomiTail ]
  appearances:
    enum.HumanoidVisualLayers.Tail:
      matchSkin: true

