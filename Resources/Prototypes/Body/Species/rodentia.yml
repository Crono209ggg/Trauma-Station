- type: markingsGroup
  parent: Human
  id: Rodentia
  limits:
    enum.HumanoidVisualLayers.Head:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: false
      default: [ RodentiaTailDefault ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 2
      required: false
      default: [ RodentiaHeadTopEarDefault ]
  appearances:
    enum.HumanoidVisualLayers.Tail:
      matchSkin: true

- type: entity
  parent: AppearanceHuman
  id: AppearanceRodentia
  categories: [ HideSpawnMenu ]
  name: rodentia appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganRodentiaTorso
      Head: OrganRodentiaHead
      Tail: OrganRodentiaTail
      ArmLeft: OrganRodentiaArmLeft
      ArmRight: OrganRodentiaArmRight
      HandRight: OrganRodentiaHandRight
      HandLeft: OrganRodentiaHandLeft
      LegLeft: OrganRodentiaLegLeft
      LegRight: OrganRodentiaLegRight
      FootLeft: OrganRodentiaFootLeft
      FootRight: OrganRodentiaFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganHumanHeart
      Stomach: OrganHumanStomach
      Liver: OrganHumanLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Rodentia

- type: entity
  parent: OrganHuman
  id: OrganRodentiaExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _DV/Mobs/Species/Rodentia/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _DV/Mobs/Species/Rodentia/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Rodentia

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorsoTailed, OrganRodentiaExternal ]
  id: OrganRodentiaTorso
  components:
  - type: Sprite
    state: torso_m
  - type: VisualOrgan
    data:
      sprite: _DV/Mobs/Species/Rodentia/parts.rsi
      state: torso_m
    sexStateOverrides:
      Male: torso_m
      Female: torso_f

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganRodentiaExternal ]
  id: OrganRodentiaHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout

- type: entity
  parent: [ OrganBaseTail, OrganRodentiaExternal ]
  id: OrganRodentiaTail
  components:
  - type: Sprite
    sprite: _Trauma/empty.rsi
    state: empty
  - type: VisualOrgan
    data:
      sprite: _Trauma/empty.rsi
      state: empty

- type: entity
  parent: [ OrganBaseArmLeft, OrganRodentiaExternal ]
  id: OrganRodentiaArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganRodentiaExternal ]
  id: OrganRodentiaArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganRodentiaExternal ]
  id: OrganRodentiaHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganRodentiaExternal ]
  id: OrganRodentiaHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganRodentiaExternal ]
  id: OrganRodentiaLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganRodentiaExternal ]
  id: OrganRodentiaLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganRodentiaExternal ]
  id: OrganRodentiaFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganRodentiaExternal ]
  id: OrganRodentiaFootRight
